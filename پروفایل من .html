<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile App</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family: Tahoma;
  background:#0b1220;
  color:#e5e7eb;
}

header{
  position:fixed;
  top:0;
  width:100%;
  background:#111827;
  padding:15px;
  text-align:center;
  font-weight:bold;
  color:#38bdf8;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
  z-index:1000;
}


.container{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding-top:80px;
}


.card{
  width:340px;
  background:#1f2937;
  border-radius:20px;
  padding:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.5);
  animation:fadeIn 0.6s ease;
  transform:translateY(10px);
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(10px);}
}

/* عکس پروفایل */
.profile{
  display:flex;
  justify-content:center;
  margin-top:-60px;
}

.profile img{
  width:100px;
  height:100px;
  border-radius:50%;
  border:3px solid #38bdf8;
  object-fit:cover;
  box-shadow:0 10px 20px rgba(0,0,0,0.6);
}

h2{
  text-align:center;
  margin:10px 0 20px;
  color:#38bdf8;
}

ul{
  list-style:none;
  padding:0;
}

li{
  background:#111827;
  margin-bottom:10px;
  padding:12px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}

li:hover{
  background:#1e293b;
  transform:scale(1.02);
}

.left{
  display:flex;
  align-items:center;
  gap:10px;
  color:#94a3b8;
}

.left i{
  color:#38bdf8;
}

strong{
  color:#f9fafb;
}

a{
  color:#38bdf8;
  text-decoration:none;
}

.whatsapp{
  position:fixed;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  color:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition:0.3s;
}

.whatsapp:hover{
  transform:scale(1.1);
}
</style>
</head>

<body>

<div class="container">

      <strong>سلیمان سلیمانی</strong>

    <li>

    <li>

    <li>

    <li>
      <div class="left"><i class="fa fa-phone"></i>شماره</div>
      <strong dir="ltr"><a href="tel:+93795811349">+93795811349</a></strong>
    </li>

    

    <li>

</div>
