<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#07111f;
min-height:100vh;
overflow-x:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* BACKGROUND */

.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
overflow:hidden;
z-index:-1;
}

.circle{
position:absolute;
border-radius:50%;
filter:blur(100px);
opacity:.45;
animation:float 8s infinite alternate;
}

.c1{
width:280px;
height:280px;
background:#00bfff;
top:-100px;
right:-100px;
}

.c2{
width:240px;
height:240px;
background:#4682b4;
bottom:-90px;
left:-80px;
}

@keyframes float{
100%{
transform:translateY(35px);
}
}

/* CARD */

.card{
width:100%;
max-width:380px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border-radius:30px;
padding:18px;
border:1px solid rgba(255,255,255,.1);
box-shadow:0 10px 35px rgba(0,0,0,.4);
}

/* COVER */

.cover{
height:135px;
border-radius:22px;
background:
linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.25)),
url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1400&auto=format&fit=crop');
background-size:cover;
background-position:center;
}

/* PROFILE */

.profile{
display:flex;
justify-content:center;
margin-top:-52px;
}

.profile img{
width:105px;
height:105px;
border-radius:50%;
border:4px solid #07111f;
object-fit:cover;
box-shadow:0 0 25px rgba(0,191,255,.4);
}

/* NAME */

.name{
text-align:center;
margin-top:14px;
}

.name h1{
font-size:26px;
font-weight:bold;
background:linear-gradient(90deg,#00bfff,#87cefa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.name p{
margin-top:6px;
color:#cbd5e1;
font-size:13px;
}

/* INFO */

.info{
margin-top:22px;
display:flex;
flex-direction:column;
gap:12px;
}

.box{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:14px;
border-radius:16px;
display:flex;
align-items:center;
gap:12px;
}

.box i{
width:38px;
height:38px;
display:flex;
justify-content:center;
align-items:center;
border-radius:11px;
background:rgba(0,191,255,.15);
color:#38bdf8;
font-size:15px;
}

.box-content{
flex:1;
}

.box-content h3{
font-size:14px;
margin-bottom:3px;
}

.box-content p,
.box-content a{
font-size:13px;
color:#dbeafe;
text-decoration:none;
word-break:break-word;
}

/* FOOTER */

.footer{
margin-top:20px;
text-align:center;
font-size:11px;
color:#94a3b8;
}

</style>
</head>
